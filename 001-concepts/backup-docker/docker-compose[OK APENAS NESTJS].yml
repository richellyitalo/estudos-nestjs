services:
  app:
    container_name: nestjs-app
    build: .
    working_dir: /home/node/app

    entrypoint: sh -c "npm install && npm run start:dev"

    volumes:
      - .:/home/node/app
      - /home/node/app/node_modules

    ports:
      - '3000:3000'

    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
